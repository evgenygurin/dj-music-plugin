name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check app/ tests/

      - name: Ruff format
        run: uv run ruff format --check app/ tests/

      - name: Mypy
        run: uv run mypy app/

      - name: Architecture contracts
        run: uv run lint-imports

      - name: Tests
        run: uv run pytest -q --timeout=60 -x
        env:
          DJ_DATABASE_URL: "sqlite+aiosqlite://"
