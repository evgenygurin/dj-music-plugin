[project]
name = "dj-music-plugin"
version = "0.1.0"
description = "MCP server for DJ techno music library management"
requires-python = ">=3.12"
dependencies = [
    "fastmcp[tasks]>=3.1.0",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "aiosqlite>=0.20",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "httpx>=0.27",
    "numpy>=1.26",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
audio = ["librosa>=0.10", "soundfile>=0.12", "scipy>=1.12", "essentia>=2.1b6.dev1389"]
stems = ["demucs>=4.0", "torch>=2.0"]
postgres = ["pgvector>=0.3"]
http = ["fastapi>=0.115", "uvicorn[standard]>=0.34"]
otel = [
    "opentelemetry-distro",
    "opentelemetry-exporter-otlp",
]
sentry = ["sentry-sdk>=2.0"]

[tool.ruff]
line-length = 99
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = [
    "UP046",  # Generic[T] is clearer than PEP 695 type params for Pydantic
    "E402",   # Module imports not at top (tool registration pattern in server.py)
]

[tool.ruff.lint.per-file-ignores]
"app/migrations/**" = ["E501"]  # autogenerated migration files
"app/audio/**" = ["RUF012"]  # mutable class defaults OK for analyzer ABC pattern
"app/ym/**" = ["E501"]  # long URLs and API paths
"app/services/**" = ["E501"]  # long f-strings in error messages
"app/mcp/tools/**" = ["E501"]  # tool descriptions and f-strings
"tests/**" = ["E501", "RUF012"]  # test assertions can be long, mock classes OK

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["librosa.*", "soundfile.*", "demucs.*", "essentia.*", "key_value.*", "sentry_sdk.*", "anthropic.*", "scipy.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Run tests in parallel across CPU cores by default. Override with `-n 0` for
# serial execution (e.g. when debugging with pdb or inspecting per-test output).
addopts = "-n auto --dist loadfile"
filterwarnings = [
    "ignore::DeprecationWarning:sqlalchemy.*",
    # librosa is chatty when synthetic test signals are shorter than its
    # default n_fft window or when silence yields no detectable pitch.
    # Production audio is always long enough; these only fire on test fixtures.
    "ignore:n_fft=.*is too large for input signal of length.*:UserWarning:librosa.*",
    "ignore:Trying to estimate tuning from empty frequency set.*:UserWarning:librosa.*",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-xdist>=3.8.0",
    "ruff>=0.8",
    "mypy>=1.13",
    "alembic>=1.14",
]
